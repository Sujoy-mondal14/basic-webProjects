<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>


<body style="background-color: black;">
    <div class="content">
        <div class="text">
            <h1>Password Generator</h1>
        </div>

        <div class="main">

        <div class="txtSection">
                <input id="inputText"  
                    type="text"
                    placeholder="Password"
                    readonly 
                >
                <button id="button" >Copy</button>
        </div>

        <div class="change">
            <label for="length">Length : <span id="lengthValue">5</span></label>
            <input type="range" 
                id="length"
                max="100"
                min="0"
                value='5'
            >

            <label for="number">Number</label>
            <input type="checkbox" 
                id="number"
            >

            <label for="char">Character</label>
            <input type="checkbox"
                id="char"
            >

        </div>

        </div>
    </div>    
    
</body>

<script src="script.js"></script>
</html>
