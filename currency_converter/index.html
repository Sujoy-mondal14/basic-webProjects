<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Currency Conveter || v 1.0</title>
</head>
<body>

<div class="inputBox">
    <span class="title">Currency Converter</span>
    <span class="subtitle" id="rateDate">Loading rates…</span>

    <label>Amount</label>
    <div class="row">
        <input type="number" id="firstInput" value="1" />
        <select id="x"></select>
    </div>

    <div class="divider">
        <hr />
        <button id="swap">⇅</button>
        <hr />
    </div>

    <label>Converted</label>
    <div class="row">
        <input type="number" id="secondInput" readonly />
        <select id="y"></select>
    </div>

    <div class="rate-display" id="rateInfo">Select currencies to convert</div>

    <button id="convert">Convert</button>
</div>

 <script src="script.js"></script>   
 
</body>
</html>
