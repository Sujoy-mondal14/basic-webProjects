<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Calculator || V 1.0.0</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body style="background-color: #313131">
    <div class="head">Simple Calculator</div>

    <div class="display">
      <div class="previous">0</div>

      <div class="current">0</div>
    </div>

    <div class="numbers">
      <div class="rowOne">
        <span>9</span>
        <span>8</span>
        <span>7</span>
      </div>

      <div class="rowTwo">
        <span>6</span>
        <span>5</span>
        <span>4</span>
      </div>

      <div class="rowThree">
        <span>3</span>
        <span>2</span>
        <span>1</span>
      </div>
      <div class="rowFour">
        <span>0</span>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
